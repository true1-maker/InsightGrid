<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লিখুন – InsightGrid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Quill rich text editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- ════════════════ NAVBAR ════════════════ -->
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-brand"><i data-lucide="pen"></i> InsightGrid</a>
    <div class="nav-actions">
      <span class="write-save-status" id="save-status"></span>
      <a href="write.html" class="btn btn-outline btn-sm" id="nav-write-btn" style="display:none"><i data-lucide="edit"></i> লিখুন</a>
      <a href="login.html" class="btn btn-primary btn-sm" id="nav-login-btn">লগইন</a>

      <div class="dropdown" id="nav-user-menu" style="display:none">
        <div class="nav-avatar" onclick="toggleDropdown('user-dd')">
          <img id="nav-avatar" src="" alt="" style="display:none">
          <span id="nav-initials"></span>
        </div>
        <div class="dropdown-menu" id="user-dd">
          <a href="dashboard.html"><i data-lucide="bar-chart-3"></i> ড্যাশবোর্ড</a>
          <a href="profile.html"><i data-lucide="user"></i> প্রোফাইল</a>
          <div class="dropdown-divider"></div>
          <button onclick="handleLogout()"><i data-lucide="log-out"></i> লগআউট</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ════════════════ WRITE AREA ════════════════ -->
<div class="write-page">

  <!-- Top bar -->
  <div class="write-topbar">
    <h1 id="page-heading">নতুন আর্টিকেল</h1>
    <div class="write-topbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="confirmDiscard()">বাতিল</button>
      <button class="btn btn-outline btn-sm" onclick="saveDraft()">💾 ড্রাফট</button>
      <button class="btn btn-primary btn-sm" onclick="publishArticle()">🚀 প্রকাশ করুন</button>
    </div>
  </div>

  <!-- Article title -->
  <input
    type="text"
    id="title-field"
    class="title-field"
    placeholder="আর্টিকেলের শিরোনাম লিখুন...">

  <!-- Meta: category + tags -->
  <div class="write-meta-row">
    <select id="cat-select">
      <!-- Populated by buildCategoryOptions() -->
    </select>
    <input
      type="text"
      id="tags-field"
      placeholder="ট্যাগ (কমা দিয়ে আলাদা করুন: ai, শিক্ষা, প্রযুক্তি)"
      style="flex:1; min-width:200px">
  </div>

  <!-- Thumbnail upload zone -->
  <div class="thumb-zone" id="thumb-zone" onclick="document.getElementById('thumb-file').click()">
    <input type="file" id="thumb-file" accept="image/*" onchange="handleThumbSelect(event)">
    <div id="thumb-placeholder">
      <div class="thumb-zone-icon">🖼️</div>
      <strong>থাম্বনেইল যোগ করুন</strong><br>
      <span style="font-size:.78rem; margin-top:.3rem; display:block">ক্লিক করুন অথবা ছবি টেনে আনুন</span>
    </div>
  </div>
  <img id="thumb-preview" class="thumb-img-preview" alt="Thumbnail preview">

  <!-- Quill editor -->
  <div id="editor"></div>

  <!-- Bottom actions -->
  <div class="write-bottom-actions">
    <button class="btn btn-ghost" onclick="confirmDiscard()">বাতিল</button>
    <button class="btn btn-outline" onclick="saveDraft()">💾 ড্রাফট সেভ</button>
    <button class="btn btn-primary" onclick="publishArticle()">🚀 প্রকাশ করুন</button>
  </div>

</div>

<div id="toast" class="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/articles.js"></script>

<script>
  let quill;
  let editingId = null;
  let thumbURL  = '';

  // ── Require login ────────────────────────
  requireAuth();

  // ── Init auth + check for edit mode ──────
  initAuth(async (user, profile) => {
    // Check permission
    if (!profile || profile.role !== 'admin') {
      showToast('পোস্ট তৈরি করার অনুমতি নেই', 'error');
      setTimeout(() => window.location.href = 'index.html', 2000);
      return;
    }

    buildCategoryOptions('cat-select');

    const id = getQueryParam('id');
    if (id) {
      editingId = id;
      document.getElementById('page-heading').textContent = 'আর্টিকেল সম্পাদনা';
      await loadForEdit(id);
    }
  });

  // ── Init Quill ────────────────────────────
  quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'এখানে আপনার লেখা শুরু করুন...',
    modules: {
      toolbar: {
        container: [
          [{ header: [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          ['blockquote', 'code-block'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          [{ color: [] }, { background: [] }],
          ['link', 'image'],
          ['clean']
        ],
        handlers: { image: insertImageHandler }
      }
    }
  });

  // ── Image inside editor ───────────────────
  function insertImageHandler() {
    const input   = document.createElement('input');
    input.type    = 'file';
    input.accept  = 'image/*';
    input.click();
    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;
      try {
        showToast('ছবি আপলোড হচ্ছে...');
        const url   = await uploadInlineImage(file);
        const range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', url);
        quill.setSelection(range.index + 1);
        showToast('ছবি যোগ হয়েছে ✓');
      } catch (err) {
        showToast('ছবি আপলোড ব্যর্থ', 'error');
      }
    };
  }

  // ── Thumbnail select ──────────────────────
  async function handleThumbSelect(e) {
    const file = e.target.files[0];
    if (!file) return;

    // Show local preview instantly
    const preview     = document.getElementById('thumb-preview');
    const placeholder = document.getElementById('thumb-placeholder');
    preview.src               = URL.createObjectURL(file);
    preview.style.display     = 'block';
    placeholder.style.display = 'none';

    try {
      showToast('থাম্বনেইল আপলোড হচ্ছে...');
      thumbURL = await uploadThumbnail(file);
      showToast('থাম্বনেইল আপলোড হয়েছে ✓');
    } catch (err) {
      showToast('থাম্বনেইল আপলোড ব্যর্থ', 'error');
      thumbURL = '';
    }
  }

  // ── Load article for editing ──────────────
  async function loadForEdit(id) {
    try {
      const article = await getArticleById(id);
      if (!article) { showToast('আর্টিকেল পাওয়া যায়নি', 'error'); return; }

      if (article.authorId !== auth.currentUser?.uid) {
        showToast('অনুমতি নেই', 'error');
        window.location.href = 'dashboard.html';
        return;
      }

      document.getElementById('title-field').value = article.title;
      document.getElementById('tags-field').value  = (article.tags || []).join(', ');
      buildCategoryOptions('cat-select', article.category);
      quill.root.innerHTML = article.content;

      if (article.thumbnail) {
        thumbURL = article.thumbnail;
        const preview = document.getElementById('thumb-preview');
        preview.src   = article.thumbnail;
        preview.style.display = 'block';
        document.getElementById('thumb-placeholder').style.display = 'none';
      }
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ── Collect form data ─────────────────────
  function collectData(status) {
    const title    = document.getElementById('title-field').value.trim();
    const content  = quill.root.innerHTML;
    const category = document.getElementById('cat-select').value || 'General';
    const tags     = document.getElementById('tags-field').value
      .split(',').map(t => t.trim()).filter(Boolean);

    if (!title) {
      showToast('শিরোনাম লিখুন', 'error'); return null;
    }
    if (quill.getText().trim().length < 20) {
      showToast('আর্টিকেলে আরও লিখুন', 'error'); return null;
    }

    return { title, content, category, tags, thumbnail: thumbURL, status };
  }

  // ── Save handlers ─────────────────────────
  async function saveDraft()       { const d = collectData('draft');     if (d) await save(d); }
  async function publishArticle()  { const d = collectData('published'); if (d) await save(d); }

  async function save(data) {
    const statusEl = document.getElementById('save-status');
    statusEl.textContent = '💾 সেভ হচ্ছে...';

    try {
      if (editingId) {
        await updateArticle(editingId, data);
        statusEl.textContent = '✓ আপডেট হয়েছে';
        showToast(data.status === 'published' ? 'আর্টিকেল আপডেট হয়েছে ✓' : 'ড্রাফট আপডেট হয়েছে ✓');

        if (data.status === 'published') {
          const updated = await getArticleById(editingId);
          if (updated) setTimeout(() => navigateTo('article.html', { slug: updated.slug }), 900);
        }
      } else {
        const result = await createArticle(data);
        editingId = result.id;
        statusEl.textContent = '✓ সেভ হয়েছে';
        showToast(data.status === 'published' ? '🎉 আর্টিকেল প্রকাশিত হয়েছে!' : 'ড্রাফট সেভ হয়েছে ✓');

        if (data.status === 'published') {
          setTimeout(() => navigateTo('article.html', { slug: result.slug }), 900);
        } else {
          // Update URL to edit mode without reload
          history.replaceState(null, '', `write.html?id=${result.id}`);
        }
      }
    } catch (err) {
      statusEl.textContent = '✗ ব্যর্থ';
      showToast(err.message, 'error');
    }
  }

  // ── Discard ───────────────────────────────
  function confirmDiscard() {
    if (confirm('পরিবর্তন বাতিল করে ড্যাশবোর্ডে ফিরে যাবেন?')) {
      window.location.href = 'dashboard.html';
    }
  }

  // ── Drag & drop thumbnail ─────────────────
  const zone = document.getElementById('thumb-zone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
  zone.addEventListener('dragleave', () => zone.style.borderColor = '');
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = '';
    const file = e.dataTransfer?.files[0];
    if (file && file.type.startsWith('image/')) {
      handleThumbSelect({ target: { files: [file] } });
    }
  });
</script>
<script>lucide.createIcons();</script>
</body>
</html>
